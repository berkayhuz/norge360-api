title = "Norge360 Gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore explicit local-development placeholders only"
regexTarget = "line"
regexes = [
  '''(^|[^A-Za-z0-9_])(LOCAL_DEV_[A-Z0-9_]+|CHANGE_ME_[A-Z0-9_]+|DB_(HOST|NAME|USER|PASSWORD)|R2_(ACCOUNT_ID|BUCKET_NAME|ACCESS_KEY_ID|SECRET_ACCESS_KEY)|SMTP_(HOST|USERNAME|PASSWORD)|RABBITMQ_(HOST|USER|PASSWORD))([^A-Za-z0-9_]|$)''',
]

[[allowlists]]
description = "Ignore known non-secret development identifiers"
regexTarget = "line"
regexes = [
  '''local-dev-key''',
  '''local-dev-discovery-internal-token-change-me''',
]
