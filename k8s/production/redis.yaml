apiVersion: v1
kind: Service
metadata:
  name: norge360-redis
spec:
  type: ClusterIP
  selector:
    app: norge360-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: norge360-redis-headless
spec:
  clusterIP: None
  selector:
    app: norge360-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: norge360-redis
spec:
  serviceName: norge360-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: norge360-redis
  template:
    metadata:
      labels:
        app: norge360-redis
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4.1-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1000"
            - --protected-mode
            - "no"
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
