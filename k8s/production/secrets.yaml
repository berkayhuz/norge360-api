apiVersion: v1
kind: Secret
metadata:
  name: norge360-production-secrets
type: Opaque
stringData:
  identity-connection: "<set-in-cluster>"
  accounts-connection: "<set-in-cluster>"
  community-connection: "<set-in-cluster>"
  discovery-connection: "<set-in-cluster>"
  notification-connection: "<set-in-cluster>"
  messaging-rabbitmq-uri: "<set-in-cluster>"
  redis-connection: "<set-in-cluster>"
  discovery-internal-token: "<set-in-cluster>"
  gateway-trusted-secret: "<set-in-cluster>"
  account-internal-secret: "<set-in-cluster>"
  turnstile-secret: "<set-in-cluster>"
  meilisearch-api-key: "<set-in-cluster>"
  notification-rabbitmq-username: "<set-in-cluster>"
  notification-rabbitmq-password: "<set-in-cluster>"
  notification-smtp-host: "<set-in-cluster>"
  notification-smtp-port: "587"
  notification-smtp-username: "<set-in-cluster>"
  notification-smtp-password: "<set-in-cluster>"
  notification-smtp-from-address: "notifications@example.com"
  notification-smtp-from-name: "Norge360 Notifications"
  r2-account-id: "<set-in-cluster>"
  r2-bucket-name: "<set-in-cluster>"
  r2-access-key-id: "<set-in-cluster>"
  r2-secret-access-key: "<set-in-cluster>"

---
apiVersion: v1
kind: Secret
metadata:
  name: norge360-auth-signing-key
type: Opaque
stringData:
  auth-jwt-signing.pem: |
    -----BEGIN PRIVATE KEY-----
    <set-in-cluster>
    -----END PRIVATE KEY-----
