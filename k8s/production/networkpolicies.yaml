apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-allow-same-namespace-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: norge360-production
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-allow-ingress-nginx-to-edge
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - norge360-auth-api
          - norge360-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
