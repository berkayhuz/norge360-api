apiVersion: apps/v1
kind: Deployment
metadata:
  name: norge360-auth-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: norge360-auth-api
  template:
    metadata:
      labels:
        app: norge360-auth-api
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-api
          image: ghcr.io/berkayhuz/norge360-auth-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: AllowedHosts
              value: auth.norge360.com;norge360-auth-api
            - name: LocalDevelopment__DisableHttpsRedirection
              value: "false"
            - name: ConnectionStrings__IdentityConnection
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: identity-connection
            - name: Messaging__RabbitMq__Uri
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: messaging-rabbitmq-uri
            - name: Infrastructure__DistributedCache__RedisConnectionString
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: redis-connection
            - name: Infrastructure__DataProtection__RedisConnectionString
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: redis-connection
            - name: Infrastructure__DataProtection__KeyRingPath
              value: ""
            - name: Infrastructure__AwsParameterStore__Enabled
              value: "false"
            - name: Auth__Login__AccountsGatewayBaseUrl
              value: http://norge360-gateway:8080/
            - name: Cloudflare__Turnstile__Enabled
              value: "true"
            - name: Cloudflare__Turnstile__SecretKey
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: turnstile-secret
            - name: Security__TrustedGateway__CurrentKeyId
              value: gateway-k8s-key-2026-01
            - name: Security__TrustedGateway__Keys__0__KeyId
              value: gateway-k8s-key-2026-01
            - name: Security__TrustedGateway__Keys__0__Secret
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: gateway-trusted-secret
            - name: Security__TrustedGateway__Keys__1__KeyId
              value: account-internal-k8s-key-2026-01
            - name: Security__TrustedGateway__Keys__1__Secret
              valueFrom:
                secretKeyRef:
                  name: norge360-production-secrets
                  key: account-internal-secret
            - name: Security__TrustedGateway__AllowedGatewayNetworks__0
              value: 10.0.0.0/8
            - name: Jwt__Issuer
              value: https://auth.norge360.com
            - name: Jwt__Audience
              value: api://norge360
            - name: Jwt__SigningKeys__0__KeyId
              value: auth-k8s-rsa-2026-01
            - name: Jwt__SigningKeys__0__IsCurrent
              value: "true"
            - name: Jwt__SigningKeys__0__PrivateKeyPath
              value: /run/secrets/Norge360-auth-signing.pem
            - name: Database__ApplyMigrationsOnStartup
              value: "false"
          volumeMounts:
            - name: auth-signing-key
              mountPath: /run/secrets/Norge360-auth-signing.pem
              subPath: auth-jwt-signing.pem
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/live
              port: http
              httpHeaders:
                - name: Host
                  value: norge360-auth-api
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
              httpHeaders:
                - name: Host
                  value: norge360-auth-api
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
              httpHeaders:
                - name: Host
                  value: norge360-auth-api
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: norge360-auth-api
      volumes:
        - name: auth-signing-key
          secret:
            secretName: norge360-auth-signing-key

