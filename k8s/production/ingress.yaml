apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: norge360-gateway
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/whitelist-source-range: 10.0.0.4/32
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: norge360-gateway
              port:
                number: 8080
