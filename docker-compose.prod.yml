services:
  auth:
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"

  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"

  discovery-api:
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"
      ConnectionStrings__DiscoveryConnection: "${ConnectionStrings__DiscoveryConnection:?ConnectionStrings__DiscoveryConnection is required}"
      Discovery__Database__MigrateOnStartup: "false"
      Security__InternalEvents__Enabled: "true"
      Security__InternalEvents__HeaderName: "X-Discovery-Internal-Token"
      Security__InternalEvents__Token: "${Discovery__InternalEvents__Token:?Discovery__InternalEvents__Token is required}"

  discovery-worker:
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DiscoveryConnection: "${ConnectionStrings__DiscoveryConnection:?ConnectionStrings__DiscoveryConnection is required}"

  accounts-api:
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"
      Services__Discovery__Enabled: "true"
      Services__Discovery__BaseUrl: "http://discovery-api:8080"
      Services__Discovery__InternalTokenHeaderName: "X-Discovery-Internal-Token"
      Services__Discovery__InternalToken: "${Discovery__InternalEvents__Token:?Discovery__InternalEvents__Token is required}"

  accounts-worker:
    environment:
      DOTNET_ENVIRONMENT: Production

  community-api:
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"
      Services__Discovery__Enabled: "true"
      Services__Discovery__BaseUrl: "http://discovery-api:8080"
      Services__Discovery__InternalTokenHeaderName: "X-Discovery-Internal-Token"
      Services__Discovery__InternalToken: "${Discovery__InternalEvents__Token:?Discovery__InternalEvents__Token is required}"

  community-worker:
    environment:
      DOTNET_ENVIRONMENT: Production

  search-api:
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDevelopment__DisableHttpsRedirection: "false"

  search-worker:
    environment:
      DOTNET_ENVIRONMENT: Production

  notification-worker:
    environment:
      DOTNET_ENVIRONMENT: Production

  meilisearch:
    ports: !reset []

  rabbitmq:
    ports: !reset []
