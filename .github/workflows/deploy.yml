name: Deploy Norge360

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Sync repository on server
        run: |
          set -euo pipefail

          cd /opt/norge360
          git fetch origin main
          git reset --hard origin/main

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Build and push images
        env:
          IMAGE_TAG: latest
          IMAGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          cd /opt/norge360

          build_and_push() {
            local image_name="$1"
            local dockerfile="$2"

            docker build \
              -f "$dockerfile" \
              -t "ghcr.io/norge360/$image_name:$IMAGE_TAG" \
              -t "ghcr.io/norge360/$image_name:$IMAGE_SHA" \
              .

            docker push "ghcr.io/norge360/$image_name:$IMAGE_TAG"
            docker push "ghcr.io/norge360/$image_name:$IMAGE_SHA"
          }

          build_and_push "norge360-auth-api" "src/services/auth/deploy/Norge360.Auth.API.Dockerfile"
          build_and_push "norge360-api-gateway" "src/platform/gateway/deploy/Norge360.ApiGateway.Dockerfile"
          build_and_push "norge360-accounts-api" "src/services/accounts/deploy/Norge360.Accounts.API.Dockerfile"
          build_and_push "norge360-community-api" "src/services/community/deploy/Norge360.Community.API.Dockerfile"
          build_and_push "norge360-discovery-api" "src/services/discovery/deploy/Norge360.Discovery.API.Dockerfile"
          build_and_push "norge360-discovery-worker" "src/services/discovery/deploy/Norge360.Discovery.Worker.Dockerfile"
          build_and_push "norge360-accounts-worker" "src/services/accounts/deploy/Norge360.Accounts.Worker.Dockerfile"
          build_and_push "norge360-community-worker" "src/services/community/deploy/Norge360.Community.Worker.Dockerfile"
          build_and_push "norge360-search-api" "src/services/search/deploy/Norge360.Search.API.Dockerfile"
          build_and_push "norge360-search-worker" "src/services/search/deploy/Norge360.Search.Worker.Dockerfile"
          build_and_push "norge360-notification-worker" "src/services/notification/deploy/Norge360.Notification.Worker.Dockerfile"

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail

          cd /opt/norge360
          kubectl apply -k k8s/production

      - name: Sync GHCR pull secret and rollout immutable images
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          namespace=norge360-production

          kubectl -n "$namespace" create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_READ_USER" \
            --docker-password="$GHCR_READ_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

          set_image_and_wait() {
            local deployment_name="$1"
            local container_name="$2"
            local image_name="$3"

            kubectl -n "$namespace" set image "deployment/$deployment_name" \
              "$container_name=ghcr.io/norge360/$image_name:$IMAGE_SHA"
            kubectl -n "$namespace" rollout status "deployment/$deployment_name" --timeout=10m
          }

          set_image_and_wait "norge360-auth-api" "auth-api" "norge360-auth-api"
          set_image_and_wait "norge360-discovery-api" "discovery-api" "norge360-discovery-api"
          set_image_and_wait "norge360-accounts-api" "accounts-api" "norge360-accounts-api"
          set_image_and_wait "norge360-community-api" "community-api" "norge360-community-api"
          set_image_and_wait "norge360-search-api" "search-api" "norge360-search-api"
          set_image_and_wait "norge360-gateway" "gateway" "norge360-api-gateway"
          set_image_and_wait "norge360-accounts-worker" "accounts-worker" "norge360-accounts-worker"
          set_image_and_wait "norge360-community-worker" "community-worker" "norge360-community-worker"
          set_image_and_wait "norge360-discovery-worker" "discovery-worker" "norge360-discovery-worker"
          set_image_and_wait "norge360-search-worker" "search-worker" "norge360-search-worker"
          set_image_and_wait "norge360-notification-worker" "notification-worker" "norge360-notification-worker"
