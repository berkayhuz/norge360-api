name: Deploy Norge360

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore Norge360.slnx

      - name: Verify formatting
        run: dotnet format Norge360.slnx --verify-no-changes --no-restore

      - name: Build with analyzers
        run: dotnet build Norge360.slnx -c Release --no-restore

      - name: Static production preflight
        run: node scripts/tools/preflight-production.mjs

  secret-scan:
    name: Secret scan gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Scan repository with Gitleaks
        run: node scripts/gitleaks.mjs dir

  preflight:
    name: Preflight unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - src/services/auth/tests/Norge360.Auth.Application.UnitTests/Norge360.Auth.Application.UnitTests.csproj
          - src/services/auth/tests/Norge360.Auth.Contracts.Tests/Norge360.Auth.Contracts.Tests.csproj
          - src/services/auth/tests/Norge360.Auth.Domain.UnitTests/Norge360.Auth.Domain.UnitTests.csproj
          - src/services/auth/tests/Norge360.Auth.ArchitectureTests/Norge360.Auth.ArchitectureTests.csproj
          - src/services/accounts/tests/Norge360.Accounts.Application.UnitTests/Norge360.Accounts.Application.UnitTests.csproj
          - src/services/community/tests/Norge360.Community.API.UnitTests/Norge360.Community.API.UnitTests.csproj
          - src/services/discovery/tests/Norge360.Discovery.Application.UnitTests/Norge360.Discovery.Application.UnitTests.csproj
          - src/services/notification/tests/Norge360.Notification.UnitTests/Norge360.Notification.UnitTests.csproj
          - src/services/search/tests/Norge360.Search.Application.UnitTests/Norge360.Search.Application.UnitTests.csproj
          - src/services/search/tests/Norge360.Search.Worker.UnitTests/Norge360.Search.Worker.UnitTests.csproj
          - src/platform/gateway/tests/Norge360.ApiGateway.UnitTests/Norge360.ApiGateway.UnitTests.csproj
          - src/packages/dotnet/tests/Norge360.Configuration/Norge360.Configuration.UnitTests/Norge360.Configuration.UnitTests.csproj
          - src/services/search/tests/Norge360.Search.ArchitectureTests/Norge360.Search.ArchitectureTests.csproj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        run: dotnet test ${{ matrix.project }} --configuration Release --no-restore

  package-architecture-tests:
    name: Package architecture tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore package architecture tests
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t projects < <(find src/packages/dotnet/tests -type f -name '*.Architecture.Tests.csproj' | sort)
          if [ "${#projects[@]}" -eq 0 ]; then
            echo "No package architecture tests found."
            exit 0
          fi

          for project in "${projects[@]}"; do
            echo "Restoring $project"
            dotnet restore "$project"
          done

      - name: Run package architecture tests
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t projects < <(find src/packages/dotnet/tests -type f -name '*.Architecture.Tests.csproj' | sort)
          if [ "${#projects[@]}" -eq 0 ]; then
            echo "No package architecture tests found."
            exit 0
          fi

          for project in "${projects[@]}"; do
            echo "Testing $project"
            dotnet test "$project" --configuration Release --no-restore
          done

  deploy:
    needs:
      - quality
      - secret-scan
      - preflight
      - package-architecture-tests
    runs-on: self-hosted
    env:
      KUBECONFIG: /root/.kube/config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node dependencies
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Runtime production preflight
        env:
          ConnectionStrings__AccountsConnection: ${{ secrets.ConnectionStrings__AccountsConnection }}
          ConnectionStrings__CommunityConnection: ${{ secrets.ConnectionStrings__CommunityConnection }}
          ConnectionStrings__DiscoveryConnection: ${{ secrets.ConnectionStrings__DiscoveryConnection }}
          ConnectionStrings__IdentityConnection: ${{ secrets.ConnectionStrings__IdentityConnection }}
          ConnectionStrings__NotificationConnection: ${{ secrets.ConnectionStrings__NotificationConnection }}
          MESSAGING_RABBITMQ_URI: ${{ secrets.Messaging__RabbitMq__Uri }}
          REDIS_CONNECTION: ${{ secrets.Infrastructure__DistributedCache__RedisConnectionString || 'norge360-redis:6379,abortConnect=false' }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          node scripts/tools/preflight-production.mjs --require-runtime-secrets

      - name: Build and push images
        env:
          IMAGE_TAG: latest
          IMAGE_SHA: ${{ github.sha }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- || true)"

          build_all=true
          selected_images=()

          mark_all() {
            build_all=true
          }

          add_image() {
            local image_name="$1"
            local dockerfile="$2"
            selected_images+=("$image_name|$dockerfile")
          }

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              .github/workflows/*|scripts/*|docker-compose*.yml|Directory.Build.props|Directory.Build.targets|Directory.Packages.props|global.json|Norge360.slnx|.dockerignore|.nuget/*|package.json|pnpm-lock.yaml|src/packages/dotnet/*)
                mark_all
                ;;
              src/services/auth/*)
                add_image "norge360-auth-api" "src/services/auth/deploy/Norge360.Auth.API.Dockerfile"
                ;;
              src/platform/gateway/*)
                add_image "norge360-api-gateway" "src/platform/gateway/deploy/Norge360.ApiGateway.Dockerfile"
                ;;
              src/services/accounts/*)
                add_image "norge360-accounts-api" "src/services/accounts/deploy/Norge360.Accounts.API.Dockerfile"
                add_image "norge360-accounts-worker" "src/services/accounts/deploy/Norge360.Accounts.Worker.Dockerfile"
                ;;
              src/services/community/*)
                add_image "norge360-community-api" "src/services/community/deploy/Norge360.Community.API.Dockerfile"
                add_image "norge360-community-worker" "src/services/community/deploy/Norge360.Community.Worker.Dockerfile"
                ;;
              src/services/discovery/*)
                add_image "norge360-discovery-api" "src/services/discovery/deploy/Norge360.Discovery.API.Dockerfile"
                add_image "norge360-discovery-worker" "src/services/discovery/deploy/Norge360.Discovery.Worker.Dockerfile"
                ;;
              src/services/search/*)
                add_image "norge360-search-api" "src/services/search/deploy/Norge360.Search.API.Dockerfile"
                add_image "norge360-search-worker" "src/services/search/deploy/Norge360.Search.Worker.Dockerfile"
                ;;
              src/services/notification/*)
                add_image "norge360-notification-worker" "src/services/notification/deploy/Norge360.Notification.Worker.Dockerfile"
                ;;
            esac
          done <<< "$changed_files"

          # Production deploys apply the Kubernetes manifests before setting immutable
          # image tags. Build every image so no deployment is left on a stale :latest tag.
          build_all=true

          declare -A seen=()

          build_and_push() {
            local image_name="$1"
            local dockerfile="$2"

            docker build \
              -f "$dockerfile" \
              -t "ghcr.io/$IMAGE_OWNER/$image_name:$IMAGE_TAG" \
              -t "ghcr.io/$IMAGE_OWNER/$image_name:$IMAGE_SHA" \
              .

            docker push "ghcr.io/$IMAGE_OWNER/$image_name:$IMAGE_TAG"
            docker push "ghcr.io/$IMAGE_OWNER/$image_name:$IMAGE_SHA"
          }

          if [ "$build_all" = true ]; then
            selected_images=(
              "norge360-auth-api|src/services/auth/deploy/Norge360.Auth.API.Dockerfile"
              "norge360-api-gateway|src/platform/gateway/deploy/Norge360.ApiGateway.Dockerfile"
              "norge360-accounts-api|src/services/accounts/deploy/Norge360.Accounts.API.Dockerfile"
              "norge360-community-api|src/services/community/deploy/Norge360.Community.API.Dockerfile"
              "norge360-discovery-api|src/services/discovery/deploy/Norge360.Discovery.API.Dockerfile"
              "norge360-discovery-worker|src/services/discovery/deploy/Norge360.Discovery.Worker.Dockerfile"
              "norge360-accounts-worker|src/services/accounts/deploy/Norge360.Accounts.Worker.Dockerfile"
              "norge360-community-worker|src/services/community/deploy/Norge360.Community.Worker.Dockerfile"
              "norge360-search-api|src/services/search/deploy/Norge360.Search.API.Dockerfile"
              "norge360-search-worker|src/services/search/deploy/Norge360.Search.Worker.Dockerfile"
              "norge360-notification-worker|src/services/notification/deploy/Norge360.Notification.Worker.Dockerfile"
            )
          fi

          for entry in "${selected_images[@]}"; do
            image_name="${entry%%|*}"
            dockerfile="${entry#*|}"
            if [ -z "${seen[$image_name]:-}" ]; then
              seen[$image_name]=1
              build_and_push "$image_name" "$dockerfile"
            fi
          done

      - name: Sync Kubernetes secrets
        env:
          ACCOUNT_INTERNAL_SECRET: ${{ secrets.Security__TrustedGateway__Keys__1__Secret }}
          ACCOUNTS_CONNECTION: ${{ secrets.ConnectionStrings__AccountsConnection }}
          AUTH_JWT_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.AUTH_JWT_SIGNING_PRIVATE_KEY_PEM }}
          COMMUNITY_CONNECTION: ${{ secrets.ConnectionStrings__CommunityConnection }}
          DISCOVERY_CONNECTION: ${{ secrets.ConnectionStrings__DiscoveryConnection }}
          DISCOVERY_INTERNAL_TOKEN: ${{ secrets.Discovery__InternalEvents__Token }}
          GATEWAY_TRUSTED_SECRET: ${{ secrets.Security__TrustedGateway__Keys__0__Secret }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          IDENTITY_CONNECTION: ${{ secrets.ConnectionStrings__IdentityConnection }}
          MESSAGING_RABBITMQ_URI: ${{ secrets.Messaging__RabbitMq__Uri }}
          MEILISEARCH_API_KEY: ${{ secrets.Meilisearch__ApiKey }}
          NOTIFICATION_CONNECTION: ${{ secrets.ConnectionStrings__NotificationConnection }}
          NOTIFICATION_RABBITMQ_PASSWORD: ${{ secrets.Notification__RabbitMq__Password }}
          NOTIFICATION_RABBITMQ_USERNAME: ${{ secrets.Notification__RabbitMq__Username }}
          NOTIFICATION_SMTP_FROM_ADDRESS: notifications@norge360.com
          NOTIFICATION_SMTP_FROM_NAME: Norge360 Notifications
          NOTIFICATION_SMTP_HOST: email-smtp.eu-west-1.amazonaws.com
          NOTIFICATION_SMTP_PASSWORD: ${{ secrets.Notification__Email__Smtp__Password }}
          NOTIFICATION_SMTP_PORT: "587"
          NOTIFICATION_SMTP_USERNAME: ${{ secrets.Notification__Email__Smtp__UserName }}
          R2_ACCOUNT_ID: ${{ secrets.Media__CloudflareR2__AccountId }}
          R2_ACCESS_KEY_ID: ${{ secrets.Media__CloudflareR2__AccessKeyId }}
          R2_BUCKET_NAME: ${{ secrets.Media__CloudflareR2__BucketName }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.Media__CloudflareR2__SecretAccessKey }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          node scripts/tools/sync-k8s-production-secrets.mjs

      - name: Ensure RabbitMQ TLS secret
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          bash scripts/tools/ensure-rabbitmq-tls-secret.sh

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"
          kubectl apply -k k8s/production

      - name: Rollout immutable images
        env:
          IMAGE_SHA: ${{ github.sha }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          namespace=norge360-production

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- || true)"
          rollout_all=true
          selected_deployments=()

          mark_all() {
            rollout_all=true
          }

          add_rollout() {
            selected_deployments+=("$1|$2|$3")
          }

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            case "$file" in
              .github/workflows/*|scripts/*|docker-compose*.yml|Directory.Build.props|Directory.Build.targets|Directory.Packages.props|global.json|Norge360.slnx|.dockerignore|.nuget/*|package.json|pnpm-lock.yaml|src/packages/dotnet/*)
                mark_all
                ;;
              src/services/auth/*)
                add_rollout "norge360-auth-api" "auth-api" "norge360-auth-api"
                ;;
              src/platform/gateway/*)
                add_rollout "norge360-gateway" "gateway" "norge360-api-gateway"
                ;;
              src/services/accounts/*)
                add_rollout "norge360-accounts-api" "accounts-api" "norge360-accounts-api"
                add_rollout "norge360-accounts-worker" "accounts-worker" "norge360-accounts-worker"
                ;;
              src/services/community/*)
                add_rollout "norge360-community-api" "community-api" "norge360-community-api"
                add_rollout "norge360-community-worker" "community-worker" "norge360-community-worker"
                ;;
              src/services/discovery/*)
                add_rollout "norge360-discovery-api" "discovery-api" "norge360-discovery-api"
                add_rollout "norge360-discovery-worker" "discovery-worker" "norge360-discovery-worker"
                ;;
              src/services/search/*)
                add_rollout "norge360-search-api" "search-api" "norge360-search-api"
                add_rollout "norge360-search-worker" "search-worker" "norge360-search-worker"
                ;;
              src/services/notification/*)
                add_rollout "norge360-notification-worker" "notification-worker" "norge360-notification-worker"
                ;;
            esac
          done <<< "$changed_files"

          set_image_and_wait() {
            local deployment_name="$1"
            local container_name="$2"
            local image_name="$3"

            kubectl -n "$namespace" scale "deployment/$deployment_name" --replicas=1
            if [ "$deployment_name" = "norge360-gateway" ]; then
              kubectl -n "$namespace" set env "deployment/$deployment_name" Kestrel__Endpoints__Https__Url- || true
            fi
            kubectl -n "$namespace" set image "deployment/$deployment_name" \
              "$container_name=ghcr.io/$IMAGE_OWNER/$image_name:$IMAGE_SHA"
            if ! kubectl -n "$namespace" rollout status "deployment/$deployment_name" --timeout=10m; then
              kubectl -n "$namespace" get pods -l "app=$deployment_name" -o wide || true
              kubectl -n "$namespace" describe pods -l "app=$deployment_name" || true
              kubectl -n "$namespace" logs -l "app=$deployment_name" --all-containers --tail=200 || true
              kubectl -n "$namespace" logs -l "app=$deployment_name" --all-containers --previous --tail=200 || true
              return 1
            fi
          }

          # Keep every production deployment on the same immutable commit SHA.
          # This prevents kubectl apply from leaving unchanged services on :latest.
          rollout_all=true

          if [ "$rollout_all" = true ] || [ "${#selected_deployments[@]}" -eq 0 ]; then
            selected_deployments=(
              "norge360-auth-api|auth-api|norge360-auth-api"
              "norge360-discovery-api|discovery-api|norge360-discovery-api"
              "norge360-accounts-api|accounts-api|norge360-accounts-api"
              "norge360-community-api|community-api|norge360-community-api"
              "norge360-search-api|search-api|norge360-search-api"
              "norge360-gateway|gateway|norge360-api-gateway"
              "norge360-accounts-worker|accounts-worker|norge360-accounts-worker"
              "norge360-community-worker|community-worker|norge360-community-worker"
              "norge360-discovery-worker|discovery-worker|norge360-discovery-worker"
              "norge360-search-worker|search-worker|norge360-search-worker"
              "norge360-notification-worker|notification-worker|norge360-notification-worker"
            )
          fi

          declare -A rollout_seen=()
          for entry in "${selected_deployments[@]}"; do
            deployment_name="${entry%%|*}"
            rest="${entry#*|}"
            container_name="${rest%%|*}"
            image_name="${rest##*|}"
            if [ -z "${rollout_seen[$deployment_name]:-}" ]; then
              rollout_seen[$deployment_name]=1
              set_image_and_wait "$deployment_name" "$container_name" "$image_name"
            fi
          done

      - name: Smoke test gateway
        run: |
          set -euo pipefail

          namespace=norge360-production
          port_forward_log="$(mktemp)"

          kubectl -n "$namespace" rollout status deployment/norge360-gateway --timeout=5m
          kubectl -n "$namespace" port-forward --address 127.0.0.1 svc/norge360-gateway 18080:8080 >"$port_forward_log" 2>&1 &
          pf_pid=$!

          print_gateway_diagnostics() {
            echo "::group::Gateway diagnostics"
            kubectl -n "$namespace" get deploy norge360-gateway -o wide || true
            kubectl -n "$namespace" get pods -l app=norge360-gateway -o wide || true
            kubectl -n "$namespace" get endpoints norge360-gateway -o wide || true
            kubectl -n "$namespace" describe pods -l app=norge360-gateway || true
            kubectl -n "$namespace" logs -l app=norge360-gateway --all-containers --tail=200 || true
            kubectl -n "$namespace" logs -l app=norge360-gateway --all-containers --previous --tail=200 || true
            echo "::endgroup::"
          }

          cleanup() {
            kill "$pf_pid" >/dev/null 2>&1 || true
            wait "$pf_pid" >/dev/null 2>&1 || true
            echo "::group::Gateway port-forward log"
            cat "$port_forward_log" || true
            echo "::endgroup::"
            rm -f "$port_forward_log"
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if ! kill -0 "$pf_pid" 2>/dev/null; then
              echo "Gateway port-forward exited before it was ready."
              print_gateway_diagnostics
              exit 1
            fi
            if grep -q "Forwarding from 127.0.0.1:18080" "$port_forward_log"; then
              break
            fi
            sleep 1
          done

          if ! grep -q "Forwarding from 127.0.0.1:18080" "$port_forward_log"; then
            echo "Gateway port-forward did not become ready."
            print_gateway_diagnostics
            exit 1
          fi

          smoke() {
            local path="$1"

            for _ in $(seq 1 30); do
              if curl -fsS -H "Host: norge360.com" "http://127.0.0.1:18080$path" >/dev/null; then
                return 0
              fi
              sleep 2
            done

            echo "Gateway smoke test failed for $path."
            print_gateway_diagnostics
            return 1
          }

          smoke /health/ready
          smoke /.well-known/openid-configuration
