name: Deploy Norge360

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on local server
        run: |
          set -e

          cd /opt/norge360

          git fetch origin main
          git reset --hard origin/main

          docker compose \
            -f docker-compose.yml \
            -f docker-compose.server.yml \
            up -d --build

          docker image prune -f