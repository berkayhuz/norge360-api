services:
  auth:
    build:
      context: .
      dockerfile: services/auth/deploy/Norge360.Auth.API.Dockerfile
    container_name: norge360-auth
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      ConnectionStrings__IdentityConnection: "${ConnectionStrings__IdentityConnection}"
      Database__Provider: "PostgreSql"
      Messaging__RabbitMq__Uri: "${Messaging__RabbitMq__Uri}"
      InvitationDelivery__Provider: "${InvitationDelivery__Provider}"
      InvitationDelivery__SmtpHost: "${InvitationDelivery__SmtpHost}"
      InvitationDelivery__SmtpPort: "${InvitationDelivery__SmtpPort}"
      InvitationDelivery__SmtpUseStartTls: "${InvitationDelivery__SmtpUseStartTls}"
      InvitationDelivery__SmtpUserName: "${InvitationDelivery__SmtpUserName}"
      InvitationDelivery__SmtpPassword: "${InvitationDelivery__SmtpPassword}"
      InvitationDelivery__SenderAddress: "${InvitationDelivery__SenderAddress}"
      InvitationDelivery__SenderName: "${InvitationDelivery__SenderName}"
      InvitationDelivery__DisableDelivery: "${InvitationDelivery__DisableDelivery}"
      Security__TrustedGateway__Keys__0__Secret: "norge360_gateway_auth_shared_secret_2026!"
      Security__TrustedGateway__Keys__1__Secret: "norge360_account_internal_secret_2026!"
      Security__TrustedGateway__AllowedGatewayNetworks__0: "172.16.0.0/12"
      Jwt__Issuer: "https://auth.local"
      Jwt__Audience: "api://norge360"
      Cloudflare__Turnstile__Enabled: "false"
      Auth__Login__AccountsGatewayBaseUrl: "http://gateway:8080/"
    ports:
      - "5297:8080"

  gateway:
    build:
      context: .
      dockerfile: src/platform/gateway/deploy/Norge360.ApiGateway.Dockerfile
    container_name: norge360-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      Security__TrustedGateway__CurrentKeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__KeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__Secret: "norge360_gateway_auth_shared_secret_2026!"
      ReverseProxy__Clusters__auth-api-cluster__Destinations__destination1__Address: "http://auth:8080/"
      ReverseProxy__Clusters__accounts-api-cluster__Destinations__destination1__Address: "http://accounts-api:8080/"
      ReverseProxy__Clusters__search-api-cluster__Destinations__destination1__Address: "http://search-api:8080/"
      ReverseProxy__Clusters__community-api-cluster__Destinations__destination1__Address: "http://community-api:8080/"
      ReverseProxy__Clusters__discovery-api-cluster__Destinations__destination1__Address: "http://discovery-api:8080/"
    depends_on:
      auth:
        condition: service_started
      accounts-api:
        condition: service_started
      search-api:
        condition: service_started
      community-api:
        condition: service_started
      discovery-api:
        condition: service_started
    ports:
      - "5030:8080"

  accounts-api:
    build:
      context: .
      dockerfile: services/accounts/deploy/Norge360.Accounts.API.Dockerfile
    container_name: norge360-accounts-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      ConnectionStrings__AccountsConnection: "${ConnectionStrings__AccountsConnection}"
      Messaging__RabbitMq__Uri: "${Messaging__RabbitMq__Uri}"
      Messaging__RabbitMq__Exchange: "Norge360.integration"
      Authentication__JwtBearer__Authority: "https://auth.local"
      Authentication__JwtBearer__MetadataAddress: "http://auth:8080/.well-known/openid-configuration"
      Authentication__JwtBearer__Issuer: "https://auth.local"
      Authentication__JwtBearer__Audience: "api://norge360"
      Authentication__JwtBearer__RequireHttpsMetadata: "false"
      Security__TrustedGateway__CurrentKeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__KeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__Secret: "norge360_gateway_auth_shared_secret_2026!"
      InternalServices__Signing__Enabled: "${InternalServices__Signing__Enabled:-false}"
      InternalServices__Signing__Secret: "${InternalServices__Signing__Secret:-}"
      InternalServices__Signing__ClockSkewSeconds: "${InternalServices__Signing__ClockSkewSeconds:-120}"
      InternalServices__Signing__ServiceName: "${InternalServices__Signing__ServiceName:-community-api}"
      Services__Discovery__Enabled: "true"
      Services__Discovery__BaseUrl: "http://discovery-api:8080"
      Services__Discovery__InternalTokenHeaderName: "X-Discovery-Internal-Token"
      Services__Discovery__InternalToken: "${Discovery__InternalEvents__Token:-local-dev-discovery-internal-token-change-me}"
      Media__CloudflareR2__AccountId: "${Media__CloudflareR2__AccountId:-local-dev-r2-account}"
      Media__CloudflareR2__BucketName: "${Media__CloudflareR2__BucketName:-local-dev-r2-bucket}"
      Media__CloudflareR2__AccessKeyId: "${Media__CloudflareR2__AccessKeyId:-local-dev-r2-access-key}"
      Media__CloudflareR2__SecretAccessKey: "${Media__CloudflareR2__SecretAccessKey:-local-dev-r2-secret-key}"
    ports:
      - "5289:8080"
    depends_on:
      discovery-api:
        condition: service_healthy

  community-api:
    build:
      context: .
      dockerfile: services/community/deploy/Norge360.Community.API.Dockerfile
    container_name: norge360-community-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      ConnectionStrings__CommunityConnection: "${ConnectionStrings__CommunityConnection}"
      Authentication__JwtBearer__Authority: "https://auth.local"
      Authentication__JwtBearer__MetadataAddress: "http://auth:8080/.well-known/openid-configuration"
      Authentication__JwtBearer__Issuer: "https://auth.local"
      Authentication__JwtBearer__Audience: "api://norge360"
      Authentication__JwtBearer__RequireHttpsMetadata: "false"
      Security__TrustedGateway__CurrentKeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__KeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__Secret: "norge360_gateway_auth_shared_secret_2026!"
      Security__TrustedGateway__AllowedGatewayNetworks__0: "172.16.0.0/12"
      Services__Accounts__BaseUrl: "http://gateway:8080"
      Services__Discovery__Enabled: "true"
      Services__Discovery__BaseUrl: "http://discovery-api:8080"
      Services__Discovery__InternalTokenHeaderName: "X-Discovery-Internal-Token"
      Services__Discovery__InternalToken: "${Discovery__InternalEvents__Token:-local-dev-discovery-internal-token-change-me}"
      InternalServices__Signing__Enabled: "${InternalServices__Signing__Enabled:-false}"
      InternalServices__Signing__Secret: "${InternalServices__Signing__Secret:-}"
      InternalServices__Signing__ClockSkewSeconds: "${InternalServices__Signing__ClockSkewSeconds:-120}"
      InternalServices__Signing__ServiceName: "${InternalServices__Signing__ServiceName:-community-api}"
      Media__CloudflareR2__AccountId: "${Media__CloudflareR2__AccountId:-local-dev-r2-account}"
      Media__CloudflareR2__BucketName: "${Media__CloudflareR2__BucketName:-local-dev-r2-bucket}"
      Media__CloudflareR2__AccessKeyId: "${Media__CloudflareR2__AccessKeyId:-local-dev-r2-access-key}"
      Media__CloudflareR2__SecretAccessKey: "${Media__CloudflareR2__SecretAccessKey:-local-dev-r2-secret-key}"
    ports:
      - "5301:8080"
    depends_on:
      discovery-api:
        condition: service_healthy

  discovery-api:
    build:
      context: .
      dockerfile: services/discovery/deploy/Norge360.Discovery.API.Dockerfile
    container_name: norge360-discovery-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      ConnectionStrings__DiscoveryConnection: "${ConnectionStrings__DiscoveryConnection:-Host=host.docker.internal;Port=5433;Database=norge360_discovery;Username=admin_norge360;Password=Minezuh3447!!;Include Error Detail=true}"
      Authentication__JwtBearer__Authority: "https://auth.local"
      Authentication__JwtBearer__MetadataAddress: "http://auth:8080/.well-known/openid-configuration"
      Authentication__JwtBearer__Issuer: "https://auth.local"
      Authentication__JwtBearer__Audience: "api://norge360"
      Authentication__JwtBearer__RequireHttpsMetadata: "false"
      Security__TrustedGateway__CurrentKeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__KeyId: "local-dev-key"
      Security__TrustedGateway__Keys__0__Secret: "norge360_gateway_auth_shared_secret_2026!"
      Security__TrustedGateway__AllowedGatewayNetworks__0: "172.16.0.0/12"
      Security__InternalEvents__Enabled: "true"
      Security__InternalEvents__HeaderName: "X-Discovery-Internal-Token"
      Security__InternalEvents__Token: "${Discovery__InternalEvents__Token:-local-dev-discovery-internal-token-change-me}"
    ports:
      - "5302:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  discovery-worker:
    build:
      context: .
      dockerfile: services/discovery/deploy/Norge360.Discovery.Worker.Dockerfile
    container_name: norge360-discovery-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DiscoveryConnection: "${ConnectionStrings__DiscoveryConnection:-Host=host.docker.internal;Port=5433;Database=norge360_discovery;Username=admin_norge360;Password=Minezuh3447!!;Include Error Detail=true}"
      Discovery__RankingWorker__Enabled: "true"
      Discovery__RankingWorker__IntervalSeconds: "300"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - while true; do dotnet Norge360.Discovery.Worker.dll; echo "discovery-worker exited, retrying in 5s"; sleep 5; done
    depends_on:
      discovery-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  notification-worker:
    build:
      context: .
      dockerfile: services/notification/deploy/Norge360.Notification.Worker.Dockerfile
    container_name: norge360-notification-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__NotificationConnection: "${ConnectionStrings__NotificationConnection}"
      Notification__Database__ApplyMigrationsOnStartup: "true"
      Messaging__RabbitMq__Uri: "${Messaging__RabbitMq__Uri}"
      Notification__RabbitMq__Host: "rabbitmq"
      Notification__RabbitMq__Port: "5672"
      Notification__RabbitMq__Username: "${Notification__RabbitMq__Username}"
      Notification__RabbitMq__Password: "${Notification__RabbitMq__Password}"
      Notification__IntegrationConsumer__Enabled: "true"
      Notification__Email__Provider: "smtp"
      Notification__Email__Smtp__Host: "${Notification__Email__Smtp__Host}"
      Notification__Email__Smtp__Port: "${Notification__Email__Smtp__Port}"
      Notification__Email__Smtp__UserName: "${Notification__Email__Smtp__UserName}"
      Notification__Email__Smtp__Password: "${Notification__Email__Smtp__Password}"
      Notification__Email__Smtp__FromAddress: "${Notification__Email__Smtp__FromAddress}"
      Notification__Email__Smtp__FromName: "${Notification__Email__Smtp__FromName}"
      Notification__Email__Smtp__UseStartTls: "${Notification__Email__Smtp__UseStartTls}"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - while true; do dotnet Norge360.Notification.Worker.dll; echo "notification-worker exited, retrying in 5s"; sleep 5; done
    depends_on:
      auth:
        condition: service_started
      gateway:
        condition: service_started
      rabbitmq:
        condition: service_started

  accounts-worker:
    build:
      context: .
      dockerfile: services/accounts/deploy/Norge360.Accounts.Worker.Dockerfile
    container_name: norge360-accounts-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__AccountsConnection: "${ConnectionStrings__AccountsConnection}"
      Messaging__RabbitMq__Uri: "${Messaging__RabbitMq__Uri}"
      Messaging__RabbitMq__Exchange: "Norge360.integration"
      SearchBootstrap__ReindexUsersOnStartup: "true"
      SearchBootstrap__BatchSize: "250"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - while true; do dotnet Norge360.Accounts.Worker.dll; echo "accounts-worker exited, retrying in 5s"; sleep 5; done
    depends_on:
      auth:
        condition: service_started
      gateway:
        condition: service_started
      rabbitmq:
        condition: service_started

  community-worker:
    build:
      context: .
      dockerfile: services/community/deploy/Norge360.Community.Worker.Dockerfile
    container_name: norge360-community-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__CommunityConnection: "${ConnectionStrings__CommunityConnection}"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - while true; do dotnet Norge360.Community.Worker.dll; echo "community-worker exited, retrying in 5s"; sleep 5; done
    depends_on:
      community-api:
        condition: service_started

  search-api:
    build:
      context: .
      dockerfile: services/search/deploy/Norge360.Search.API.Dockerfile
    container_name: norge360-search-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      LocalDevelopment__DisableHttpsRedirection: "true"
      Kestrel__Endpoints__Http__Url: "http://+:8080"
      Kestrel__Endpoints__Https__Url: "http://+:8081"
      Authentication__Jwt__Issuer: "https://auth.local"
      Authentication__Jwt__Audience: "api://norge360"
      Authentication__Jwt__Authority: "http://auth:8080"
      Authentication__Jwt__MetadataAddress: "http://auth:8080/.well-known/openid-configuration"
      Search__Provider: "Meilisearch"
      Search__IndexName: "searchdocuments"
      Search__StaticIndexing__Enabled: "false"
      Search__StaticIndexing__SeedOnStartup: "false"
      Search__BlockFilter__Enabled: "true"
      Search__BlockFilter__AccountsApiBaseUrl: "http://accounts-api:8080"
      Meilisearch__Endpoint: "http://meilisearch:7700"
      Meilisearch__ApiKey: "NORGE360_DEV_MEILI_MASTER_KEY_2026_0001"
    ports:
      - "5299:8080"
    depends_on:
      auth:
        condition: service_started
      accounts-api:
        condition: service_started
      meilisearch:
        condition: service_started

  search-worker:
    build:
      context: .
      dockerfile: services/search/deploy/Norge360.Search.Worker.Dockerfile
    container_name: norge360-search-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      Search__Provider: "Meilisearch"
      Search__IndexName: "searchdocuments"
      Search__StaticIndexing__Enabled: "false"
      Search__StaticIndexing__SeedOnStartup: "false"
      Search__IntegrationConsumer__Enabled: "true"
      Search__IntegrationConsumer__QueueName: "norge360.search.indexer"
      Search__IntegrationConsumer__RoutingKeyPatterns__0: "search.document.index.requested.v1"
      Search__IntegrationConsumer__RoutingKeyPatterns__1: "search.document.delete.requested.v1"
      Search__IntegrationConsumer__RoutingKeyPatterns__2: "search.reindex.requested.v1"
      Meilisearch__Endpoint: "http://meilisearch:7700"
      Meilisearch__ApiKey: "NORGE360_DEV_MEILI_MASTER_KEY_2026_0001"
      Messaging__RabbitMq__Uri: "${Messaging__RabbitMq__Uri}"
      Messaging__RabbitMq__Exchange: "Norge360.integration"
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - while true; do dotnet Norge360.Search.Worker.dll; echo "search-worker exited, retrying in 5s"; sleep 5; done
    depends_on:
      rabbitmq:
        condition: service_started
      meilisearch:
        condition: service_started

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: norge360-meilisearch
    environment:
      MEILI_MASTER_KEY: "NORGE360_DEV_MEILI_MASTER_KEY_2026_0001"
    ports:
      - "7700:7700"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: norge360-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    depends_on:
      gateway:
        condition: service_started
